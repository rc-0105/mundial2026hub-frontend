<div class="auth-container">
  <div class="auth-card">
    <div class="auth-header">
      <h1>Iniciar sesión</h1>
      <p>Accedé a tu cuenta para ver tu agenda personal del Mundial 2026</p>
    </div>

    @if (error()) {
      <div class="error-banner">{{ error() }}</div>
    }

    <form (ngSubmit)="login()" class="auth-form">
      <div class="form-group">
        <label for="correo">Correo electrónico</label>
        <input
          id="correo"
          type="email"
          [(ngModel)]="correo"
          name="correo"
          placeholder="tu@email.com"
          required
          [disabled]="loading()"
        />
      </div>

      <div class="form-group">
        <label for="password">Contraseña</label>
        <input
          id="password"
          type="password"
          [(ngModel)]="password"
          name="password"
          placeholder="Mínimo 8 caracteres"
          required
          [disabled]="loading()"
        />
      </div>

      <button
        type="submit"
        class="btn-primary btn-full"
        [disabled]="loading()"
      >
        @if (loading()) {
          <span class="spinner"></span>
          Iniciando sesión...
        } @else {
          Iniciar sesión
        }
      </button>
    </form>

    <div class="auth-footer">
      <p>¿No tenés cuenta? <a routerLink="/registro" class="link">Registrate aquí</a></p>
    </div>
  </div>
</div>

<style>
  .auth-container {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, var(--primary) 0%, var(--electric-violet) 100%);
    padding: 1rem;
  }

  .auth-card {
    background: white;
    border-radius: var(--radius-lg);
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
    padding: 2.5rem;
    width: 100%;
    max-width: 420px;
  }

  .auth-header {
    text-align: center;
    margin-bottom: 2rem;
  }

  .auth-header h1 {
    font-size: 1.75rem;
    font-weight: 700;
    color: var(--gray-900);
    margin-bottom: 0.5rem;
  }

  .auth-header p {
    font-size: 0.9rem;
    color: var(--gray-500);
  }

  .error-banner {
    background: #fef2f2;
    color: #dc2626;
    border: 1px solid #fecaca;
    border-radius: var(--radius);
    padding: 1rem;
    margin-bottom: 1.5rem;
    font-size: 0.9rem;
    text-align: center;
  }

  .auth-form {
    display: flex;
    flex-direction: column;
    gap: 1.5rem;
    margin-bottom: 2rem;
  }

  .form-group {
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
  }

  .form-group label {
    font-weight: 500;
    color: var(--gray-700);
    font-size: 0.9rem;
  }

  .form-group input {
    padding: 0.75rem 1rem;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    font-size: 0.95rem;
    transition: all 0.2s;
    font-family: inherit;
  }

  .form-group input:focus {
    outline: none;
    border-color: var(--primary);
    box-shadow: 0 0 0 3px rgba(51, 76, 255, 0.1);
  }

  .form-group input:disabled {
    background: var(--gray-50);

  }

  .btn-full {
    width: 100%;
    display: flex;

  }

  .spinner {

  }

  @keyframes spin {

  }

  .auth-footer {

    border-top: 1px solid var(--border);

  }

  .auth-footer p {

  }

  .link {
    color: var(--primary);
    font-weight: 600;
    text-decoration: none;

  }

  .link:hover {
    opacity: 0.8;
  }
</style>
